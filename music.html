<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nothing Music Iframe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: transparent; --card: #0c0c0c; --text: #fff; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'VT323', monospace; text-transform: uppercase; }
        
        body { 
            background: var(--bg); color: var(--text); text-align: center; padding: 40px 20px 20px 20px; 
            overflow-x: hidden; scrollbar-width: none;
        }
        body::-webkit-scrollbar { display: none; }

        h2 { font-size: 2.2rem; margin-bottom: 20px; font-weight: normal; letter-spacing: 2px;}

        .search-box-m { display: flex; background: #eef2f7; padding: 5px 10px; border-radius: 50px; border: 1px solid var(--border); margin: 0 auto 20px auto; align-items: center; width: 100%; max-width: 400px; }
        .search-box-m input { flex: 1; background: transparent; border: none; color: #000; padding: 12px; font-size: 1.4rem; outline: none; }
        .go-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #000; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        #music-card { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 25px; text-align: center; max-width: 400px; margin: 0 auto; }
        .disc { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--border); margin: 0 auto 15px auto; object-fit: cover; display: block; box-shadow: 0 0 20px rgba(255,0,0,0.1); }
        .spinning { animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .m-ctrls { display: flex; justify-content: center; align-items: center; gap: 35px; font-size: 2rem; margin: 25px 0; }
        
        .btn { width: 100%; padding: 18px; border-radius: 22px; border: none; background: var(--text); color: #000; font-size: 1.6rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h2>RINGTONE PLAYER</h2>
    
    <div class="search-box-m">
        <input type="text" id="mQuery" placeholder="SEARCH SONG...">
        <button class="go-btn" id="mSearchBtn" onclick="searchMusic()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div id="music-card">
        <img src="" id="mArt" class="disc">
        <h3 id="mTitle" style="margin-top:15px; font-size: 1.8rem;">TITLE</h3>
        <p id="mArtist" style="opacity:0.5; font-size: 1.2rem;">ARTIST</p>
        
        <div class="m-ctrls">
            <i class="fa-solid fa-backward-step" onclick="prevSong()" style="cursor:pointer"></i>
            <span id="play-pause" onclick="togglePlay()" style="cursor:pointer"><i class="fa-solid fa-circle-play"></i></span>
            <i class="fa-solid fa-forward-step" onclick="nextSong()" style="cursor:pointer"></i>
        </div>
        
        <button class="btn" onclick="downloadCurrentSong()">DOWNLOAD MP3</button>
    </div>

    <audio id="mPlayer" onended="nextSong()"></audio>

    <script>
        let currentPlaylist = [], currentIndex = 0;

        async function searchMusic() {
            const query = document.getElementById('mQuery').value;
            const btn = document.getElementById('mSearchBtn');
            const card = document.getElementById('music-card');
            
            if (!query) return;
            
            const originalBtn = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            
            try {
                const res = await fetch(`https://jiosaavn-api-privatecvc2.vercel.app/search/songs?query=${encodeURIComponent(query)}`);
                const json = await res.json();
                const songs = json?.data?.results || json?.data || [];

                if (songs.length > 0) {
                    currentPlaylist = songs.map(song => {
                        let imgUrl = song.image && song.image.length > 0 ? (song.image[song.image.length - 1].url || song.image[song.image.length - 1].link) : "";
                        let audioUrl = song.downloadUrl && song.downloadUrl.length > 0 ? (song.downloadUrl[song.downloadUrl.length - 1].url || song.downloadUrl[song.downloadUrl.length - 1].link) : "";

                        return {
                            url: audioUrl, 
                            art: imgUrl,
                            title: (song.name || song.title || "UNKNOWN").toUpperCase(), 
                            artist: "NOTHING COMMUNITY"
                        };
                    });
                    
                    currentIndex = 0; 
                    card.style.display = "block"; 
                    loadSong(0);
                } else {
                    alert("NOTHING FOUND");
                }
            } catch (e) { 
                console.error(e); 
                alert("SERVER ERROR. PLEASE TRY AGAIN.");
            } finally { 
                btn.innerHTML = originalBtn; 
            }
        }

        function loadSong(index) {
            if (!currentPlaylist[index]) return;
            const song = currentPlaylist[index];
            const player = document.getElementById('mPlayer');
            
            document.getElementById('mArt').src = song.art;
            document.getElementById('mTitle').innerText = song.title;
            document.getElementById('mArtist').innerText = song.artist;
            
            player.src = song.url; 
            player.load(); 
            togglePlay(true);
        }

        function togglePlay(forcePlay = false) {
            const player = document.getElementById('mPlayer');
            const icon = document.querySelector('#play-pause i');
            const art = document.getElementById('mArt');
            
            if (player.paused || forcePlay) { 
                player.play().catch(()=>{}); 
                icon.className = "fa-solid fa-circle-pause"; 
                art.classList.add('spinning'); 
            } else { 
                player.pause(); 
                icon.className = "fa-solid fa-circle-play"; 
                art.classList.remove('spinning'); 
            }
        }

        function nextSong() { if(currentPlaylist.length) { currentIndex = (currentIndex + 1) % currentPlaylist.length; loadSong(currentIndex); } }
        function prevSong() { if(currentPlaylist.length) { currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length; loadSong(currentIndex); } }

        async function downloadCurrentSong() {
            const song = currentPlaylist[currentIndex];
            const btn = document.querySelector('.btn');
            const originalText = btn.innerText;
            if(!song) return;
            
            btn.style.pointerEvents = "none"; btn.innerText = "FETCHING...";
            try {
                const response = await fetch(song.url);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const cleanTitle = song.title.replace(/[^a-zA-Z0-9\s]/g, '').trim(); 
                const fileName = `${cleanTitle} - NothingSpace.mp3`;
                const a = document.createElement('a'); a.href = url; a.download = fileName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(url);
                btn.innerText = "DONE ✓";
            } catch (e) {
                console.error(e); window.open(song.url, '_blank'); btn.innerText = "OPENED";
            }
            setTimeout(() => { btn.innerText = originalText; btn.style.pointerEvents = "all"; }, 2000);
        }
    </script>
</body>
</html>
